{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<h1>Register</h1>
<form method="post">
    {% csrf_token %}
    {{ form.non_field_errors }}
    {{ form.as_p }}
    <input type="submit" value="Register">
</form>
<p style="margin-top:1rem">Already have an account? <a href="{% url 'login' %}">Login</a></p>
{% endblock %}
