{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<h1>Login</h1>
<form method="post">
    {% csrf_token %}
    {{ form.non_field_errors }}
    {{ form.as_p }}
    <input type="submit" value="Login">
</form>
<p style="margin-top:1rem">Don't have an account? <a href="{% url 'register' %}">Register</a></p>
{% endblock %}
